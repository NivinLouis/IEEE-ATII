name: Deploy IEEE ATIIG site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck libraries
        run: pnpm exec tsc --build

      - name: Typecheck apps
        run: pnpm -r --filter "./artifacts/**" --filter "./scripts" --if-present run typecheck

      - name: Build IEEE ATIIG site
        env:
          PORT: 5173
          BASE_PATH: /
          VITE_SITE_URL: https://atiig.ieeekerala.org
        run: pnpm --dir artifacts/ieee-atiig run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/ieee-atiig/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
